### Evidencia en animales no-humanos


.two-col[

.card-blue[

- Cardúmenes de Luciopercas doradas son liderados por pocos peces más valientes y con más habilidades. existe una proporción de 1 pex hábil a 12 naïves.
- Elefantes que viven en zonas en sequía aprovechan la memoria de las hembras para lograr ir a otras zonas que conocieron varias décadas atrás.
- Hormigas más hábiles enseñan a otras hormigas naïves para encontrar el camino a recursos.
- En primates la evidencia es mayor y tendiente a la dominancia: Gorilas controlan actividades de sus subordinados.

### ¿Qué es ser un líder?

.pull-left[


- Liderazgo como "Iniciación a nuevas direcciones de movimiento"

- _Evolutionary Theory of Leadership_ Define liderazgo como:

&gt;"Proceso de influencia social para lograr objetivos compartidos" 

]

--

.pull-right[
Seguidores buscan:


&gt; 1. Un guía en una dirección que evite la dispersión individual 
&gt; 2. Protección contra amenazas provocadas en conflicto intergrupal
&gt; 3. Resolución de conflictos intragrupales


**Para ello el líder debe tener la habilidad de tomar la iniciativa y coordinar esfuerzos**

]

&lt;br&gt;
&lt;br&gt;
&lt;br&gt;


.footnote-small[
&lt;font size="-3"&gt;Van Vugt, M., &amp; Ahuja, A. (2011). Naturally selected: The evolutionary science of leadership (1st U.S. ed). HarperBusiness.&lt;/font&gt;

]

## Liderazgo basado en personalidad


.two-col[

.red-card[

- Creencia de que para ser lider se necesitaban cualidades "superiores"
- Teoría del gran hombre (Carlyle)
- Héroes tenían inteligencia y saboduría que tuvieron impacto
- 6 clases de héroes (divididad, poeta, profeta, Rey, etc)
- Stogdill (1948) hizo una revisión de estudios y consideró que **no hay rasgo universal**
]

.blue-card[

Sin embargo, House y Aditya (1997) realizan una nueva revisión y:

1. Hay rasgos que son consistentes en líderes (inteligencia, autoconfianza y motivación de logro y poder)
2. Estos rasgos son más relevantes cuando tienen relación con la tarea por la que el gruop existe
3. Cuando hay normas o sistemas de incentivos asociados a conductas, es la situación el que prevalece y no los rasgos

]
]
---
background-image: url(clase6_files/logo_psicologia_UDD.png)
background-size: 160px
background-position: 97% 2%
class: left, middle

## Enfoques de liderazgo y rasgos:

Estudio del grupo de Ohio establece 150 conductas de liderazgo reducidas en dos grupos

--

.two-col[

.definition-box[

**Iniciación a de estructura:** _planificación del trabajo, la definición de responsabilidades_
_y, en general, con todas aquellas conductas a través de las cuales el líder guía, estructura_
_toma parte activa en la realización de la tarea._
]


1. "Me asisgna tareas concretas"
2. "Me pide que siga los procedimientos"


.definition-box[

**Consideración:** _respeto y la_
_preocupación por el bienestar de los subordinados y con la expresión de apoyo hacia ellos_.
]

1. “Me trata como un igual”
2. “Se preocupa por mi bienestar personal”.
3. “Acepta algunos de los cambios sugeridos por mí”.

]

## La Teoría de la Expectativa de Meta

.highlight-box[
Los líderes serán eficaces en la medida en que sus conductas complementen “el entorno” laboral de sus subordinados y les ayuden a conseguir sus metas laborales o
personales.

]

--

.two-col[

.green-card[

**Clarificación de tarea**:  + útil cuando cuando roles grupales son ambiguos y - cuando subordinados se consideren competentes

**Conducta orientada al logro**: Líderes + eficientres cuando subordinados tienen alta motivación 

**Facilitadora del trabajo:** Líderes + eficaz cuando trabajo sea previsible y - necesarios si los subordinados son competentes en la tarea



]


.blue-card[

**Apoyo personal**: Líderes + eficaces si trabajo es peligroso, monótono o estresante


**Facilitador de interacción**: Cuando son interdependientes líderes son más eficaces


**Liderazgo basado en valores**: Eficiente cuando no hay muchas más recompensas o beneficios.

]
]

--

.highlight-box[ _Dependiendo de la situación, se espera del líder que adopte un tipo u otro de conductas, **que no se consideran rasgos de personalidad, sino estrategias seleccionadas conscientemente**_

]

## Teoría implícita de liderazgo


.highlight-box[

_Las personas, a través de su etapa de socialización y de las experiencias que han tenido con diversos líderes a lo largo de su vida o de su carrera profesional, desarrollan teorías implícitas del liderazgo, es decir, opiniones personales acerca de las características que debe tener un buen líder_

]

Teorías implícitas:

- Conductas o esquemas que los seguidores esperan de sus líderes

- Bases cognitivas para entender y responder a las conductas directivas

- El ajuste entre las conductas del líder y las teorías implícitas de sus seguidores determina en gran medida la percepción y valoración delas conductas del líder

## Teoría del intercambio líder-miembros (LMX)

.highlight-box[

**Premisa: los líderes desarrollan un tipo de relación diferente con cada uno de los miembros de su grupo y que la calidad de esa relación afecta de forma importante a las actitudes y conductas tanto del líder como del subordinado**
]

--

- Se ha asumido que líderes se comportan igual con todos los miembros del grupo, _pero no es así_
- Hay relaciones de buena calidad y de baja calidad
- Las de buena calidad los seguidores reciben apoyo del líder y rinden más
- Las de baja calidad hay más ditancia con el lider y hacen lo justo (sino menos)


---
background-image: url(clase6_files/logo_psicologia_UDD.png)
background-size: 160px
background-position: 97% 2%
class: left, middle


## Teoría del intercambio líder-miembros (LMX) II

.two-col[
.red-card[

- Basada en la teoría de intercambio social (Blau, 1964)

- Obligación de reciprocidad en las relaciones que se establecen entre las personas

- Intercambio repetido establece el tipo de relación y roles de trabajo

]

.blue-card[

*¿Qué crítica puede hacerse a esta teoría?*

]
]

## Identidad social y liderazgo

- EL liderazgo **es un proceso grupal, a veces olvidado**

- Identidad social (Turner) une lider e identidad social

- Líder guía colaboración endogrupal

- Miembros prototípicos emerjan como líderes (encargan identidad social compartida)

- Si el lider encarga mejor la identidad, es más eficiente independiente de todos los rasgos anteriores


.highlight-box[

La persona que más influencia ejerce en el grupo será aquella que mejor encarne los valores, creencias y actitudes del grupo en un momento dado, es decir, su miembro más prototípico.

**La labor del lider es gestionar la identidad del grupo**

]


---
background-image: url(clase6_files/logo_psicologia_UDD.png)
background-size: 160px
background-position: 97% 2%
class: left, middle


## Eficacia de los miembros prototipos dependen de:

1. Influencia: Prototipo de identidad lo vuelve grupo de referencia

2. Atracción social: Ya que encargan valores son + apreciados que el exo grupo y otros del endogrupo

3. Atribución interna del comportamiento: La gente atribuye su comportamiento a características internas

4. Confianza: Se incrementa dispositción a tyrabajar en favor del grupo

### Sistemas de liderazgo - Perspectiva evolutiva

--

.pull-left[

### Liderazgos igualitarios

- Se crean en base al prestigio del lider
- Control de recursos igualitario
- Persuación es su forma de influir socialmente
- Seguidores tienen mecanismos de control sobre líderes

]

--
.pull-right[

### Liderazgos dominantes


- Inducen temor a través de la coerción e intimidación
- Líder tiene completo control de los recursos
- Tienen rasgos físicos que indican dominancia, produciendo imitación
- "La instrumentalidad de ser simpático" (Hawley, 1999)

]

&lt;br&gt;
&lt;br&gt;
&lt;br&gt;

## Rasgos físicos

.pull-left[

- Líderes dominantes influyen porque parecen competentes, aunque quizás no lo sean
- "Rasgos de competencia" transmiten valor social al grupo

1) **Apariencia facial**

- "Cara cuadrada,  mandíbula fuerte, cejas pronunciadas y labios y ojos delgados"
- Percibido como fortaleza física para cumplir tareas de líder, entre ellas ser agresivo
- A pesar de que algunas evidencias muestran que el efecto es pequeño, las personas siguen usandolo como señal de dominancia

## Rasgos físicos


1) **Apariencia facial**

- "Cara cuadrada,  mandíbula fuerte, cejas pronunciadas y labios y ojos delgados"(Van vugt &amp; Grabo, 2015)
- Percibido como fortaleza física para cumplir tareas de líder, entre ellas ser agresivo
